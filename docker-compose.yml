services:

  nginx:
    image: nginx:1.27-alpine
    container_name: aigw-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: aigw-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - api-gateway
    restart: unless-stopped

  api-gateway:
    build: ./services/api-gateway
    container_name: aigw-api-gateway

    environment:
      PORT: 3000

      # ======================================
      # KEYCLOAK
      # ======================================
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: aigw
      KEYCLOAK_CLIENT_ID: ai-secure-gateway
      KEYCLOAK_CLIENT_SECRET: yI2E82wa3JljhEWof3FcOybMsA53qTtq
      

      # ======================================
      # OPENAI / CHATGPT
      # ======================================
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o-mini

      # ======================================
      # INTERNAL SERVICES
      # ======================================
      LLM_URL: http://llm-mock:3006
      PROMPT_INSPECTOR_URL: http://prompt-inspector:3001
      RISK_ENGINE_URL: http://risk-engine:3002
      POLICY_ENGINE_URL: http://policy-engine:3003
      RESPONSE_ANALYZER_URL: http://response-analyzer:3004
      LOGGER_GRC_URL: http://logger-grc:3005

      # ======================================
      # POSTGRES
      # ======================================
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: aigw
      PGUSER: aigw
      PGPASSWORD: aigwpass

      # ======================================
      # TOKENIZATION / ENCRYPTION
      # ======================================
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}

    depends_on:
      - keycloak
      - postgres
      - elasticsearch
      - llm-mock
      - prompt-inspector
      - risk-engine
      - policy-engine
      - response-analyzer
      - logger-grc

    restart: unless-stopped

  # ======================================================
  # KEYCLOAK
  # ======================================================

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: aigw-keycloak

    command: start-dev --import-realm

    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"

    ports:
      - "8081:8080"

    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/import:/opt/keycloak/data/import

    restart: unless-stopped

  # ======================================================
  # POSTGRES
  # ======================================================

  postgres:
    image: postgres:16-alpine
    container_name: aigw-postgres

    environment:
      POSTGRES_DB: aigw
      POSTGRES_USER: aigw
      POSTGRES_PASSWORD: aigwpass

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  # ======================================================
  # ELASTICSEARCH
  # ======================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: aigw-elasticsearch

    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

    restart: unless-stopped

  # ======================================================
  # PROMPT INSPECTOR
  # ======================================================

  prompt-inspector:
    build: ./services/prompt-inspector
    container_name: aigw-prompt-inspector

    environment:
      PORT: 3001

    restart: unless-stopped

  # ======================================================
  # RISK ENGINE
  # ======================================================

  risk-engine:
    build: ./services/risk-engine
    container_name: aigw-risk-engine

    environment:
      PORT: 3002

    restart: unless-stopped

  # ======================================================
  # POLICY ENGINE
  # ======================================================

  policy-engine:
    build: ./services/policy-engine
    container_name: aigw-policy-engine

    environment:
      PORT: 3003

    restart: unless-stopped

  # ======================================================
  # RESPONSE ANALYZER
  # ======================================================

  response-analyzer:
    build: ./services/response-analyzer
    container_name: aigw-response-analyzer

    environment:
      PORT: 3004

    restart: unless-stopped

  # ======================================================
  # LOGGER GRC
  # ======================================================

  logger-grc:
    build: ./services/logger-grc
    container_name: aigw-logger-grc

    environment:
      PORT: 3005

      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: aigw
      PGUSER: aigw
      PGPASSWORD: aigwpass

    depends_on:
      - postgres

    restart: unless-stopped

  # ======================================================
  # MOCK LLM
  # ======================================================

  llm-mock:
    build: ./services/llm-mock
    container_name: aigw-llm-mock

    environment:
      PORT: 3006

    restart: unless-stopped

# ======================================================
# VOLUMES
# ======================================================

volumes:
  keycloak_data:
  postgres_data:
  elasticsearch_data: