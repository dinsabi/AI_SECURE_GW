services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway

  api-gateway:
    build: ./services/api-gateway
    environment:
      PORT: 3000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: aigw
      KEYCLOAK_CLIENT_ID: ai-secure-gateway
      KEYCLOAK_CLIENT_SECRET: CHANGE_ME_AFTER_CREATION
      LLM_URL: http://llm-mock:3006
      PROMPT_INSPECTOR_URL: http://prompt-inspector:3001
      RISK_ENGINE_URL: http://risk-engine:3002
      POLICY_ENGINE_URL: http://policy-engine:3003
      RESPONSE_ANALYZER_URL: http://response-analyzer:3004
      LOGGER_GRC_URL: http://logger-grc:3005
    depends_on:
      - keycloak
      - llm-mock
      - prompt-inspector
      - risk-engine
      - policy-engine
      - response-analyzer
      - logger-grc

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8081:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/import:/opt/keycloak/data/import

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aigw
      POSTGRES_USER: aigw
      POSTGRES_PASSWORD: aigwpass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  prompt-inspector:
    build: ./services/prompt-inspector
    environment:
      PORT: 3001

  risk-engine:
    build: ./services/risk-engine
    environment:
      PORT: 3002

  policy-engine:
    build: ./services/policy-engine
    environment:
      PORT: 3003

  response-analyzer:
    build: ./services/response-analyzer
    environment:
      PORT: 3004

  logger-grc:
    build: ./services/logger-grc
    environment:
      PORT: 3005
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: aigw
      PGUSER: aigw
      PGPASSWORD: aigwpass
    depends_on:
      - postgres

  llm-mock:
    build: ./services/llm-mock
    environment:
      PORT: 3006

volumes:
  keycloak_data:
  postgres_data:
  elasticsearch_data: